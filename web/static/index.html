<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video-Mover Web</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Video-Mover Web</h1>
            <nav>
                <button class="nav-btn active" data-tab="download">下载</button>
                <button class="nav-btn" data-tab="dedup">去重</button>
                <button class="nav-btn" data-tab="upload">上传</button>
                <button class="nav-btn" data-tab="config">配置</button>
            </nav>
        </header>

        <main>
            <!-- Download Tab -->
            <section id="download-tab" class="tab-content active">
                <h2>下载视频</h2>
                <div class="form-group">
                    <label for="download-url">TikTok URL</label>
                    <input type="text" id="download-url" placeholder="https://www.tiktok.com/@user/video/123">
                </div>
                <div class="form-group">
                    <label for="download-time-range">时间范围 (可选)</label>
                    <input type="text" id="download-time-range" placeholder="2025-05-01 00-00-00|2025-05-02 00-00-00">
                </div>
                <button id="download-start-btn" class="btn-primary">开始下载</button>
                <div id="download-status" class="status-box"></div>
            </section>

            <!-- Dedup Tab -->
            <section id="dedup-tab" class="tab-content">
                <h2>视频去重</h2>
                <div class="form-group">
                    <label for="dedup-input">输入文件</label>
                    <div class="file-input-row">
                        <input type="text" id="dedup-input" placeholder="选择视频文件或文件夹" readonly>
                        <label class="file-input-label btn-secondary">
                            选择文件
                            <input type="file" id="dedup-file-btn" accept="video/*" style="display:none">
                        </label>
                        <label class="file-input-label btn-secondary">
                            选择文件夹
                            <input type="file" id="dedup-folder-btn" webkitdirectory style="display:none">
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="dedup-output">输出文件 (可选)</label>
                    <input type="text" id="dedup-output" placeholder="自动生成">
                </div>

                <h3>去重设置</h3>
                <div id="dedup-settings" class="settings-grid">
                    <!-- Settings will be populated by JS -->
                </div>

                <button id="dedup-start-btn" class="btn-primary">开始处理</button>
                <div id="dedup-status" class="status-box"></div>
            </section>

            <!-- Upload Tab -->
            <section id="upload-tab" class="tab-content">
                <h2>上传视频</h2>
                <div class="form-group">
                    <label for="upload-platform">平台</label>
                    <select id="upload-platform">
                        <option value="tiktok">TikTok</option>
                        <option value="wechat">微信</option>
                        <option value="douyin">抖音</option>
                        <option value="bilibili">B站</option>
                        <option value="kuaishou">快手</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="upload-account">账号</label>
                    <input type="text" id="upload-account" placeholder="my_account">
                </div>
                <div class="form-group">
                    <label for="upload-file">视频文件</label>
                    <div class="file-input-row">
                        <input type="text" id="upload-file" placeholder="选择视频文件或文件夹" readonly>
                        <label class="file-input-label btn-secondary">
                            选择文件
                            <input type="file" id="upload-file-btn" accept="video/*" style="display:none">
                        </label>
                        <label class="file-input-label btn-secondary">
                            选择文件夹
                            <input type="file" id="upload-folder-btn" webkitdirectory style="display:none">
                        </label>
                    </div>
                </div>
                <button id="upload-start-btn" class="btn-primary">上传</button>
                <div id="upload-status" class="status-box"></div>
            </section>

            <!-- Config Tab -->
            <section id="config-tab" class="tab-content">
                <h2>配置管理</h2>
                <div class="form-group">
                    <label>配置文件 (my_apps.yaml)</label>
                    <textarea id="config-content" rows="15" readonly></textarea>
                </div>
                <button id="config-save-btn" class="btn-primary">保存配置</button>
                <div id="config-message" class="message-box"></div>
            </section>
        </main>

        <footer>
            <div class="log-panel">
                <h3>实时日志</h3>
                <div id="log-content" class="log-content"></div>
            </div>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
