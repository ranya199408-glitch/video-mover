name: Deploy to Railway

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Railway
        run: |
          curl -X POST https://railway.app/api/v1/projects/${{ secrets.RAILWAY_PROJECT_ID }}/services \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"service":{"name":"video-mover","repo":"github.com/ranya199408-glitch/video-mover"}}'
